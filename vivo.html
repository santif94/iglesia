<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>En Vivo</title>

  <style>
    
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      margin: 0;
    }

    header {
      background: #2c3e50;
      padding: 5px;
    }

    header img {
      height: 100px;
      cursor: pointer;
    }

    .container {
      max-width: 400px;
      margin: auto;
      margin-top: 60px;
      padding: 20px;
    }

    h1 {
      font-size: 22px;
    }

    p {
      color: #555;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
    }

    .switch {
      position: fixed;
      top: 10px;
      right: 10px;
      font-size: 12px;
      opacity: 0.4;
      cursor: pointer;
      z-index: 999;
    }

    .switch:hover {
      opacity: 1;
    }
  </style>

</head>



<body>

<!-- HEADER -->
<header>
  <a href="iglesia/index.html">
    <img src="img/logo-iglesia.png" alt="Logo Iglesia">
  </a>
</header>

<!-- SWITCH OCULTO -->
<div class="switch" onclick="login()">⚪</div>

<!-- CONTENIDO -->
<div class="container" id="app">
  Cargando...
</div>

<script>
let CONFIG = null;

// Cargar config
fetch('./config.json')
  .then(res => res.json())
  .then(data => {
    CONFIG = data;
    render();
  });

// Renderizar según estado
function render() {
  const app = document.getElementById("app");

  if (CONFIG.estado === "activo") {
    app.innerHTML = `
      <h1>🔴 EN VIVO</h1>
      <p>${CONFIG.contenido.texto}</p>
      <a class="btn" href="${CONFIG.contenido.link}" target="_blank">
        ${CONFIG.ui.boton_activo_texto}
      </a>
    `;
  } else {
    app.innerHTML = `
      <h1>${CONFIG.ui.titulo_standby}</h1>
      <p>${CONFIG.ui.mensaje_standby}</p>
        <p>${CONFIG.ui.mensaje_standby2}</p>

      <a class="btn" href="./index.html"">
        ${CONFIG.ui.boton_inicio_texto}
      </a>
    `;
  }
}

// Auto refresh cada 10 segundos
setInterval(() => {
  location.reload();
}, 10000);


// ===== PANEL OCULTO =====

function login() {
  const pass = prompt("Contraseña:");
  if (pass === "1234") {
    panel();
  } else {
    alert("Incorrecto");
  }
}

function panel() {
  const accion = prompt(
    "Escribí:\n1 = ACTIVAR\n2 = DESACTIVAR"
  );

  if (accion === "1" || accion === "2") {
    window.open("https://github.com/santif94/iglesia/edit/main/config.json");
  }
}
</script>

</body>
</html>
