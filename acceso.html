<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Colaboradores</title>
<style>
/* COLOR INSTITUCIONAL */
:root {
  --azul-institucional: #2c3e50;
}

/* BODY */
body {
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  margin:0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER COMÚN */
header{
  background: var(--azul-institucional);
  color:white;
  padding:20px;
  text-align:center;
  position:relative;
}

header img.logo{
  width:120px;
  cursor:pointer;
}

.volver-inicio{
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  background:rgba(255,255,255,0.2);
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:5px;
  cursor:pointer;
}

.volver-inicio:hover{
  background:rgba(255,255,255,0.4);
}

/* CONTENEDOR GENERAL */
.container {
  max-width:800px;
  margin:30px auto;
  padding:20px;
  text-align:center;
}

/* LOGIN */
.login-box {
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

.login-box input {
  padding:10px;
  width:80%;
  max-width:300px;
  border:1px solid #ccc;
  border-radius:5px;
  font-size:16px;
}

.login-box button {
  padding:10px 20px;
  background: var(--azul-institucional);
  color:white;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
}

.login-box button:hover {
  background:#1a2a38;
}

/* MENSAJES */
#error-msg {
  color:red;
  font-weight:bold;
}

/* GRID DE MINISTERIOS */
.ministerios-grid {
  display:none; /* oculto hasta poner la contraseña correcta */
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap:25px;
  margin-top:30px;
  text-align:center;
  display:grid;
}

.card {
  background:white;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  text-align:center;
}

.card h3 {
  margin-top:0;
  color: var(--azul-institucional);
}

.card p {
  font-size:14px;
  margin:10px 0;
}

.card .button {
  padding:10px 18px;
  background: var(--azul-institucional);
  color:white;
  border:none;
  border-radius:5px;
  font-weight:bold;
  cursor:pointer;
  text-decoration:none;
}

.card .button:hover {
  background:#1a2a38;
}

/* RESPONSIVE */
@media(max-width:600px){
  .login-box input { width:90%; }
  .ministerios-grid { grid-template-columns:1fr; gap:20px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <img src="img/logo-iglesia.png" alt="Logo Iglesia" class="logo" onclick="window.location.href='index.html'">
  <button class="volver-inicio" onclick="window.location.href='index.html'">Inicio</button>
</header>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="login-box">
    <h2>Acceso Colaboradores</h2>
    <input type="password" id="password" placeholder="Contraseña">
    <button onclick="verificarPassword()">Ingresar</button>
    <p id="error-msg"></p>
  </div>

  <!-- GRID DE MINISTERIOS -->
  <div id="gridMinisterios" class="ministerios-grid">
    <!-- Tarjetas generadas dinámicamente -->
  </div>

</div>

<script>
// CONTRASEÑA CORRECTA
const contraseñaValida = "colaboradores2026";

function verificarPassword(){
  const pass = document.getElementById("password").value;
  const errorMsg = document.getElementById("error-msg");

  if(pass === contraseñaValida){
    errorMsg.textContent = "";
    document.getElementById("login").style.display = "none";
    document.getElementById("gridMinisterios").style.display = "grid";
    cargarMinisterios();
  } else {
    errorMsg.textContent = "Contraseña incorrecta";
  }
}

// Cargar ministerios
function cargarMinisterios(){
  const grid = document.getElementById("gridMinisterios");

  const ministerios = [
    {
      nombre: "Ministerio de Seguimiento",
      descripcion: "Se encargan de acompañar a los miembros y ayudarlos en su crecimiento espiritual.",
      botonTexto: "Acceder",
      enlace: "https://docs.google.com/spreadsheets/d/1RuXmJEpI8LJ5Vw0yuBVH_YhnM6KdHbpMPKoZ5dYtEns/edit?usp=sharing"
    },
    {
      nombre: "Ministerio de Alabanza",
      descripcion: "Responsables de liderar la música y la adoración durante los cultos.",
      botonTexto: "Acceder",
      enlace: "ministerios/int-alabanza.html"
    }
  ];

  ministerios.forEach(m => {
    const card = document.createElement("div");
    card.className = "card";

    const h3 = document.createElement("h3");
    h3.textContent = m.nombre;

    const p = document.createElement("p");
    p.textContent = m.descripcion;

    const btn = document.createElement("a");
    btn.href = m.enlace;
    btn.className = "button";
    btn.textContent = m.botonTexto;
    btn.target = "_blank"; // abre el link en nueva pestaña

    card.appendChild(h3);
    card.appendChild(p);
    card.appendChild(btn);

    grid.appendChild(card);
  });
}
</script>

</body>
</html>
